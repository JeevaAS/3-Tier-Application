name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  compile:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Frontend Syntax Check
        run: |
          cd Application-Code/frontend
          find . -name "*.js" -exec node --check {} \;

      - name: Backend Syntax Check
        run: |
          cd Application-Code/backend
          find . -name "*.js" -exec node --check {} \;
